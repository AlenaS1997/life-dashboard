name: FatSecret → Google Sheets sync

on:
  schedule:
    # 22:00 МСК ежедневно (МСК = UTC+3 → 19:00 UTC).
    # К этому времени рацион за день обычно уже записан, и до утреннего
    # дайджеста (08:30 МСК) данные успеют попасть в Sheets.
    - cron: "0 19 * * *"
  # Ручной запуск из вкладки Actions
  workflow_dispatch:
    inputs:
      days:
        description: "Сколько дней назад бэкфилить (default 1)"
        required: false
        default: "1"
      date:
        description: "Целевая дата YYYY-MM-DD (default — вчера)"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Используем `python -m pip`, а не голый `pip`, — на CI они могут
          # указывать на разные интерпретаторы, и selenium тогда ставится
          # в системный Python вместо setup-python@v5.
          python -m pip install -r requirements.txt
          # Гарантируем selenium/webdriver-manager явно — на случай, если
          # requirements.txt в репо отстал от локальной копии.
          python -m pip install "selenium>=4.15.0" "webdriver-manager>=4.0.0"
          # Sanity check — упасть тут информативнее, чем на импорте в скрипте.
          python -c "import selenium, webdriver_manager; print('selenium', selenium.__version__, 'OK')"

      - name: Восстановить service-account.json из секрета
        run: |
          mkdir -p .secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Запустить FatSecret sync
        env:
          # Cookies от ручного логина — без них в CI зайти на FS нельзя.
          FATSECRET_COOKIES_JSON: ${{ secrets.FATSECRET_COOKIES_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_PATH: .secrets/service-account.json
          # Параметры из workflow_dispatch (для cron — пустые, скрипт берёт defaults).
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          ARGS=""
          if [ -n "$INPUT_DAYS" ]; then
            ARGS="$ARGS --days $INPUT_DAYS"
          fi
          if [ -n "$INPUT_DATE" ]; then
            ARGS="$ARGS --date $INPUT_DATE"
          fi
          python scripts/fatsecret_scraper.py $ARGS

      - name: Сохранить debug HTML как артефакт (если есть)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fatsecret-debug-${{ github.run_id }}
          path: data/fatsecret_*.html
          retention-days: 7
          if-no-files-found: ignore
