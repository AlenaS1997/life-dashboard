<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Life" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <title>Life Dashboard</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #161616;
      --bg-card-2: #202020;
      --text: #fafafa;
      --text-dim: #8a8a8a;
      --text-muted: #5a5a5a;
      --sleep: #9c88ff;
      --hrv: #4fc3f7;
      --steps: #66bb6a;
      --stress: #ff7043;
      --battery: #ffca28;
      --score: #ec407a;
      --border: #2a2a2a;
      --radius: 18px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "tnum" 1, "ss01" 1;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    body {
      padding:
        max(env(safe-area-inset-top), 16px)
        env(safe-area-inset-right)
        max(env(safe-area-inset-bottom), 24px)
        env(safe-area-inset-left);
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    header {
      padding: 8px 4px 4px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    header p {
      color: var(--text-dim);
      font-size: 15px;
      margin-top: 4px;
      text-transform: capitalize;
    }

    section {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
    }
    section h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }


    /* Today metrics grid */
    .today-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .today-grid .wide {
      grid-column: span 2;
    }
    .metric {
      background: var(--bg-card-2);
      border-radius: var(--radius-sm);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }
    .metric-label {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .metric-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .metric-value .unit {
      font-size: 15px;
      color: var(--text-dim);
      font-weight: 500;
      margin-left: 3px;
    }
    .metric-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .metric .accent {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .metric.sleep  .accent { background: var(--sleep); }
    .metric.score  .accent { background: var(--score); }
    .metric.hrv    .accent { background: var(--hrv); }
    .metric.steps  .accent { background: var(--steps); }
    .metric.stress .accent { background: var(--stress); }
    .metric.battery .accent { background: var(--battery); }

    /* Цветовая индикация good/medium/bad — рамка-световой контур карточки */
    .metric.status-good { box-shadow: inset 0 0 0 1px rgba(102, 187, 106, 0.35); }
    .metric.status-warn { box-shadow: inset 0 0 0 1px rgba(255, 202, 40, 0.35); }
    .metric.status-bad  { box-shadow: inset 0 0 0 1px rgba(255, 112, 67, 0.40); }
    .metric.status-good .accent { box-shadow: 0 0 8px 1px rgba(102, 187, 106, 0.55); }
    .metric.status-warn .accent { box-shadow: 0 0 8px 1px rgba(255, 202, 40, 0.55); }
    .metric.status-bad  .accent { box-shadow: 0 0 8px 1px rgba(255, 112, 67, 0.65); }

    /* Сравнение с прошлой неделей — стрелочка + дельта */
    .delta {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
      padding: 1px 6px;
      border-radius: 999px;
      vertical-align: middle;
    }
    .delta.up-good   { background: rgba(102, 187, 106, 0.18); color: #8fdc92; }
    .delta.up-bad    { background: rgba(255, 112, 67, 0.18);  color: #ffa78c; }
    .delta.down-good { background: rgba(102, 187, 106, 0.18); color: #8fdc92; }
    .delta.down-bad  { background: rgba(255, 112, 67, 0.18);  color: #ffa78c; }
    .delta.flat      { background: rgba(120, 120, 120, 0.18); color: var(--text-dim); }
    .delta-arrow {
      font-size: 9px;
      line-height: 1;
    }

    /* Heatmap сна (30 дней) */
    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .heat-cell {
      aspect-ratio: 1 / 1;
      border-radius: 4px;
      background: rgba(156, 136, 255, 0.10);
      position: relative;
    }
    .heat-cell.empty { background: rgba(255, 255, 255, 0.04); }
    .heat-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 10px;
      color: var(--text-muted);
      justify-content: flex-end;
    }
    .heat-legend-cells {
      display: inline-flex;
      gap: 3px;
    }
    .heat-legend-cells .heat-cell {
      width: 10px;
      height: 10px;
      aspect-ratio: auto;
    }

    /* Composite Score блок */
    .score-block {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .score-main {
      flex: 0 0 auto;
      text-align: center;
      padding: 8px 14px 8px 0;
      border-right: 1px solid var(--border);
    }
    .score-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }
    .score-value .score-unit {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 500;
      margin-left: 2px;
    }
    .score-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }
    .score-breakdown {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      min-width: 0;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .score-row-label { color: var(--text-dim); }
    .score-row-value { color: var(--text); font-weight: 600; }
    .score-row-bad   { color: #ff7043; }
    .score-row-warn  { color: #ffca28; }
    .score-row-good  { color: #66bb6a; }

    /* Streaks (серии) */
    .streaks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .streak {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-card-2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
    }
    .streak-icon {
      font-size: 14px;
      flex-shrink: 0;
    }
    .streak-text {
      color: var(--text);
      flex: 1;
    }
    .streak-count {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    /* Pull-to-refresh индикатор */
    .ptr-indicator {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -100%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
      transition: transform 0.2s ease;
      z-index: 100;
      pointer-events: none;
    }
    .ptr-indicator.visible {
      transform: translate(-50%, 12px);
    }
    .ptr-indicator.spinning::before {
      content: "↻ ";
      display: inline-block;
      animation: ptr-spin 0.9s linear infinite;
    }
    @keyframes ptr-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Trends */
    .trends-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .trend {
      background: var(--bg-card-2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .trend-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .trend-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .trend-avg {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .trend-avg .unit {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 2px;
    }
    .spark {
      width: 100%;
      height: 32px;
      display: block;
    }

    /* Events */
    .events-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .event {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card-2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .event-time {
      font-size: 14px;
      font-weight: 600;
      color: var(--hrv);
      min-width: 54px;
      font-feature-settings: "tnum" 1;
    }
    .event-title {
      font-size: 15px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 12px;
      font-size: 14px;
    }

    footer {
      padding: 8px 4px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    footer button {
      appearance: none;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 8px;
      cursor: pointer;
    }
    footer button:active {
      background: var(--bg-card-2);
    }

    /* Banner */
    .banner {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.4;
    }
    .banner.warn {
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: #fff;
    }
    .banner.info {
      background: linear-gradient(135deg, #29b6f6, #1e88e5);
      color: #fff;
    }
    .banner.muted {
      background: var(--bg-card);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .banner a {
      color: inherit;
      text-decoration: underline;
      font-weight: 600;
    }
    .banner b {
      font-weight: 600;
    }

    /* Skeleton placeholders (initial load) */
    .skeleton-bar {
      background: linear-gradient(90deg, #1a1a1a, #2a2a2a, #1a1a1a);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 10px;
      margin-top: 8px;
    }
    .skeleton-bar:first-child { margin-top: 0; }
    .skeleton-bar.tall { height: 22px; }
    .skeleton-bar.w-30 { width: 30%; }
    .skeleton-bar.w-40 { width: 40%; }
    .skeleton-bar.w-50 { width: 50%; }
    .skeleton-bar.w-60 { width: 60%; }
    .skeleton-bar.w-70 { width: 70%; }
    .skeleton-bar.w-80 { width: 80%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .skeleton-bar { animation: none; }
    }
  </style>
</head>

  <script>
  // ============================================================
  // КОНФИГУРАЦИЯ
  // ============================================================
  // Чтобы подключить реальные данные:
  //   1. Открой Google Sheets → File → Share → "Anyone with the link: Viewer"
  //   2. Подставь SHEET_ID ниже (он уже вставлен из текущей таблицы).
  //   3. Убедись, что имена вкладок совпадают.
  // Если таблица не доступна публично — дашборд покажет инструкцию.
  // ============================================================
  const CONFIG = {
    SHEET_ID: "1soLhY5LtrYzcQktWqcmX9Of0YGWqnccuvj37DU3GhKE",
    GARMIN_TAB: "garmin_daily",
    EVENTS_TAB: "gcal_events",
    // true — всегда показывать demo-данные (для превью дизайна)
    FORCE_MOCK: false,
  };

  const CACHE_KEY = "life-dashboard:cache:v1";
  const CACHE_TTL_MS = 12 * 60 * 60 * 1000; // 12 часов

  // ============================================================
  // ДАННЫЕ — Google Sheets
  // ============================================================
  function gvizUrl(sheetId, tabName) {
    return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq` +
           `?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  }

  async function fetchCsv(sheetId, tabName) {
    const res = await fetch(gvizUrl(sheetId, tabName), { cache: "no-store" });
    if (!res.ok) {
      const err = new Error(`HTTP ${res.status} for tab "${tabName}"`);
      err.status = res.status;
      // Google для приватной таблицы возвращает 404/400/302 — это всё «нужен auth»
      if (res.status === 400 || res.status === 401 || res.status === 403 || res.status === 404) {
        err.code = "sheet_private";
      }
      throw err;
    }
    const text = await res.text();
    // Если таблица закрыта, gviz иногда отдаёт 200 + HTML-страницу логина
    const ct = res.headers.get("content-type") || "";
    if (ct.includes("text/html") || /^\s*</.test(text)) {
      const err = new Error(`sheet "${tabName}" requires auth`);
      err.code = "sheet_private";
      throw err;
    }
    return parseCsv(text);
  }

  function parseCsv(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 1) return [];
    const headers = splitCsvLine(lines[0]);
    return lines.slice(1).map((line) => {
      const values = splitCsvLine(line);
      const row = {};
      headers.forEach((h, i) => { row[h] = values[i] ?? ""; });
      return row;
    });
  }

  function splitCsvLine(line) {
    const out = [];
    let cur = "";
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === "," && !inQ) {
        out.push(cur); cur = "";
      } else {
        cur += c;
      }
    }
    out.push(cur);
    return out.map((v) => v.trim());
  }

  function generateMockGarmin() {
    const rows = [];
    const today = new Date();
    const seed = (i) => Math.sin(i * 17.3) * 0.5 + 0.5;
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const s = seed(i);
      rows.push({
        date: d.toISOString().slice(0, 10),
        sleep_hours: (6.5 + s * 2.5).toFixed(2),
        sleep_score: Math.round(65 + s * 30),
        body_battery_max: Math.round(72 + s * 25),
        body_battery_min: Math.round(12 + s * 20),
        hrv_last_night: Math.round(38 + s * 25),
        steps: Math.round(4500 + s * 9000),
        stress_avg: Math.round(22 + (1 - s) * 30),
      });
    }
    return rows;
  }

  function generateMockEvents() {
    return [
      { time: "09:30", title: "Стендап с командой" },
      { time: "12:00", title: "Обед + прогулка" },
      { time: "15:00", title: "Созвон с подрядчиком" },
      { time: "19:00", title: "Йога" },
    ];
  }

  function parseEvents(rows) {
    // Ожидаемые колонки: start (ISO datetime или HH:MM), summary/title
    // Make.com обычно кладёт start, end, summary. Берём события на сегодня.
    const today = new Date().toISOString().slice(0, 10);
    const result = [];
    for (const row of rows) {
      const start = row.start || row.start_time || row.begin || row.date || "";
      const title = row.summary || row.title || row.name || row.event || row.event_title || "";
      if (!title) continue;
      // Фильтр по сегодня, если start выглядит как ISO datetime
      if (start.length >= 10 && start.slice(0, 10) !== today) continue;
      const timeMatch = start.match(/(\d{2}:\d{2})/);
      result.push({ time: timeMatch ? timeMatch[1] : "—", title });
    }
    return result;
  }

  // ============================================================
  // ============================================================
  // КЭШ — localStorage (на случай оффлайна / закрытой Sheets)
  // ============================================================
  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (!data || !data.ts) return null;
      // Кэш не считается «свежим», но всегда лучше, чем mock.
      return data;
    } catch { return null; }
  }

  function saveCache(payload) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        ts: Date.now(),
        ...payload,
      }));
    } catch (e) {
      console.warn("Не получилось сохранить кэш:", e);
    }
  }

  function cacheAgeText(ts) {
    if (!ts) return "";
    const diff = Date.now() - ts;
    if (diff < 60 * 1000) return "только что";
    const mins = Math.round(diff / 60000);
    if (mins < 60) return `${mins} мин назад`;
    const hours = Math.round(mins / 60);
    if (hours < 24) return `${hours} ч назад`;
    const days = Math.round(hours / 24);
    return `${days} дн назад`;
  }

  // ============================================================
  // РЕНДЕР
  // ============================================================
  function renderHeader() {
    const hour = new Date().getHours();
    let g = "Доброе утро";
    if (hour >= 12 && hour < 18) g = "Добрый день";
    else if (hour >= 18 || hour < 5) g = "Добрый вечер";
    document.getElementById("greeting").textContent = `${g}, Михаил`;

    const dateStr = new Date().toLocaleDateString("ru-RU", {
      weekday: "long", day: "numeric", month: "long",
    });
    document.getElementById("today-date").textContent = dateStr;
  }

  function metricCard({ label, value, unit, sub, accent, wide, status }) {
    const statusClass = status ? ` status-${status}` : "";
    const wideClass = wide ? " wide" : "";
    return `
      <div class="metric ${accent}${wideClass}${statusClass}">
        <span class="accent"></span>
        <span class="metric-label">${label}</span>
        <span class="metric-value">${value}${unit ? `<span class="unit">${unit}</span>` : ""}</span>
        ${sub ? `<span class="metric-sub">${sub}</span>` : ""}
      </div>`;
  }

  // Пороги good/warn/bad. Если "lowerIsBetter" — инвертируем (стресс).
  // Возвращает 'good' | 'warn' | 'bad' | null.
  function metricStatus(key, value) {
    const v = num(value);
    if (!isFinite(v)) return null;
    const T = {
      sleep_hours:      { good: 7.0, warn: 6.0, lowerIsBetter: false },
      sleep_score:      { good: 80,  warn: 60,  lowerIsBetter: false },
      hrv_last_night:   { good: 40,  warn: 30,  lowerIsBetter: false },
      steps:            { good: 8000, warn: 5000, lowerIsBetter: false },
      stress_avg:       { good: 40,  warn: 60,  lowerIsBetter: true },
      body_battery_min: { good: 40,  warn: 20,  lowerIsBetter: false },
      body_battery_max: { good: 70,  warn: 50,  lowerIsBetter: false },
    };
    const t = T[key];
    if (!t) return null;
    if (t.lowerIsBetter) {
      if (v <= t.good) return "good";
      if (v <= t.warn) return "warn";
      return "bad";
    }
    if (v >= t.good) return "good";
    if (v >= t.warn) return "warn";
    return "bad";
  }

  function renderToday(row) {
    if (!row) {
      document.getElementById("today-grid").innerHTML =
        '<div class="empty wide" style="grid-column:span 2">Нет данных за сегодня</div>';
      return;
    }
    const grid = document.getElementById("today-grid");
    grid.innerHTML = [
      metricCard({
        label: "Сон", value: row.sleep_hours, unit: "ч",
        sub: `Score · ${row.sleep_score}`, accent: "sleep", wide: true,
        status: metricStatus("sleep_hours", row.sleep_hours),
      }),
      metricCard({
        label: "HRV", value: row.hrv_last_night, unit: "мс", accent: "hrv",
        status: metricStatus("hrv_last_night", row.hrv_last_night),
      }),
      metricCard({
        label: "Шаги", value: formatNumber(row.steps), accent: "steps",
        status: metricStatus("steps", row.steps),
      }),
      metricCard({
        label: "Стресс", value: row.stress_avg, unit: "/100", accent: "stress",
        status: metricStatus("stress_avg", row.stress_avg),
      }),
      metricCard({
        label: "Body Battery", value: `${row.body_battery_max}`,
        sub: `min · ${row.body_battery_min}`, accent: "battery",
        status: metricStatus("body_battery_min", row.body_battery_min),
      }),
    ].join("");
  }

  // Локаль-устойчивый парсер: "6,9" → 6.9, "12 509" → 12509, числа as-is.
  // Google Sheets при локали ru_RU отдаёт gviz CSV с запятыми и пробелами-разделителями.
  function num(v) {
    if (v == null || v === "") return NaN;
    if (typeof v === "number") return v;
    // \u00A0 = неразрывный пробел (иногда встречается в тысячах).
    const cleaned = String(v).replace(/[\s\u00A0]/g, "").replace(",", ".");
    const n = parseFloat(cleaned);
    return isFinite(n) ? n : NaN;
  }

  function formatNumber(v) {
    const n = num(v);
    if (!isFinite(n)) return v;
    return n.toLocaleString("ru-RU");
  }

  function sparkline(values, color) {
    if (!values.length) return "";
    const w = 140, h = 32, pad = 2;
    const nums = values.map(num).filter((v) => isFinite(v));
    if (!nums.length) return "";
    const max = Math.max(...nums);
    const min = Math.min(...nums);
    const range = max - min || 1;
    const points = nums.map((v, i) => {
      const x = pad + (i / (nums.length - 1 || 1)) * (w - pad * 2);
      const y = pad + (h - pad * 2) - ((v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");
    const lastX = pad + (w - pad * 2);
    const lastY = pad + (h - pad * 2) - ((nums[nums.length - 1] - min) / range) * (h - pad * 2);
    return `
      <svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="2.6" fill="${color}" />
      </svg>`;
  }

  // Дельта между средним за last7 и средним за prev7.
  // Возвращает HTML-бейджик «↑ 8 %» с цветом по знаку и направлению (lowerIsBetter инвертирует).
  function deltaBadge(last7, prev7, key, lowerIsBetter) {
    const avgOf = (rows) => {
      const xs = rows.map((r) => num(r[key])).filter((v) => isFinite(v));
      if (!xs.length) return null;
      return xs.reduce((a, b) => a + b, 0) / xs.length;
    };
    const a = avgOf(last7);
    const b = avgOf(prev7);
    if (a == null || b == null || b === 0) return "";
    const pctRaw = ((a - b) / Math.abs(b)) * 100;
    const pct = Math.round(pctRaw);
    if (Math.abs(pct) < 3) {
      return `<span class="delta flat" title="≈ прошлая неделя"><span class="delta-arrow">≈</span>${Math.abs(pct)}%</span>`;
    }
    const up = pct > 0;
    const sentiment = up ? (lowerIsBetter ? "bad" : "good") : (lowerIsBetter ? "good" : "bad");
    const cls = (up ? "up-" : "down-") + sentiment;
    const arrow = up ? "▲" : "▼";
    return `<span class="delta ${cls}" title="vs прошлая неделя"><span class="delta-arrow">${arrow}</span>${Math.abs(pct)}%</span>`;
  }

  function renderTrends(rows) {
    const grid = document.getElementById("trends-grid");
    if (!rows.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:span 2">Нет истории</div>';
      return;
    }
    const last7 = rows.slice(-7);
    const prev7 = rows.slice(-14, -7);
    const metrics = [
      { key: "sleep_hours",    label: "Сон",    color: "var(--sleep)",  unit: "ч",  decimals: 1, lowerIsBetter: false },
      { key: "hrv_last_night", label: "HRV",    color: "var(--hrv)",    unit: "мс", decimals: 0, lowerIsBetter: false },
      { key: "steps",          label: "Шаги",   color: "var(--steps)",  unit: "",   decimals: 0, lowerIsBetter: false },
      { key: "stress_avg",     label: "Стресс", color: "var(--stress)", unit: "",   decimals: 0, lowerIsBetter: true  },
    ];
    grid.innerHTML = metrics.map((m) => {
      const values = last7.map((r) => num(r[m.key])).filter((v) => isFinite(v));
      const hasData = values.length > 0;
      const avg = hasData ? values.reduce((a, b) => a + b, 0) / values.length : 0;
      const avgStr = !hasData
        ? "—"
        : (m.decimals
            ? avg.toFixed(m.decimals).replace(".", ",")
            : Math.round(avg).toLocaleString("ru-RU"));
      const delta = hasData && prev7.length ? deltaBadge(last7, prev7, m.key, m.lowerIsBetter) : "";
      return `
        <div class="trend">
          <div class="trend-head">
            <span class="trend-label">${m.label}${delta}</span>
            <span class="trend-avg">${avgStr}<span class="unit">${m.unit ? " " + m.unit : ""}</span></span>
          </div>
          ${sparkline(last7.map((r) => r[m.key]), m.color)}
        </div>`;
    }).join("");
  }

  // Heatmap сна за 30 последних дней. Цвет — opacity от 0.10 до 1.00.
  // Пустые ячейки (нет данных) — приглушённые.
  function renderHeatmap(rows) {
    const el = document.getElementById("heatmap");
    if (!el) return;
    const last30 = rows.slice(-30);
    if (!last30.length) {
      el.innerHTML = '<div class="empty" style="grid-column:span 7">Нет истории сна</div>';
      return;
    }
    // Рисуем ровно 30 ячеек (если данных меньше — слева пустые).
    const filled = new Array(30 - last30.length).fill(null).concat(last30);
    el.innerHTML = filled.map((r) => {
      if (!r) return '<div class="heat-cell empty" title="нет данных"></div>';
      const h = num(r.sleep_hours);
      if (!isFinite(h) || h <= 0) {
        return `<div class="heat-cell empty" title="${escapeHtml(r.date || "")}: нет данных"></div>`;
      }
      // Маппим 4..9 ч → opacity 0.15..1.00. Меньше 4 — нижний край, больше 9 — верхний.
      const norm = Math.max(0, Math.min(1, (h - 4) / 5));
      const alpha = 0.15 + norm * 0.85;
      const tip = `${escapeHtml(r.date || "")}: ${h.toFixed(1).replace(".", ",")} ч`;
      return `<div class="heat-cell" style="background: rgba(156,136,255,${alpha.toFixed(2)})" title="${tip}"></div>`;
    }).join("");
  }

  function renderEvents(events) {
    const list = document.getElementById("events-list");
    if (!events.length) {
      list.innerHTML = '<li class="empty">На сегодня событий нет</li>';
      return;
    }
    list.innerHTML = events.map((e) => `
      <li class="event">
        <span class="event-time">${escapeHtml(e.time)}</span>
        <span class="event-title">${escapeHtml(e.title)}</span>
      </li>`).join("");
  }

  // ============================================================
  // КОМПОЗИТНЫЙ SCORE — общая оценка дня 0..100
  // ============================================================
  // Вес: sleep_score 0.35, hrv 0.25, stress (инверт) 0.20, body_battery_min 0.20.
  // HRV нормализован: 20..60 мс → 0..100. Стресс инвертирован: чем меньше — тем выше вклад.
  function computeScore(row) {
    if (!row) return null;
    const ss  = num(row.sleep_score);
    const hrv = num(row.hrv_last_night);
    const st  = num(row.stress_avg);
    const bb  = num(row.body_battery_min);

    const ssNorm  = isFinite(ss)  ? Math.max(0, Math.min(100, ss)) : null;
    const hrvNorm = isFinite(hrv) ? Math.max(0, Math.min(100, ((hrv - 20) / 40) * 100)) : null;
    const stNorm  = isFinite(st)  ? Math.max(0, Math.min(100, 100 - st)) : null;
    const bbNorm  = isFinite(bb)  ? Math.max(0, Math.min(100, bb)) : null;

    const weights = [
      { v: ssNorm,  w: 0.35, label: "Сон",    raw: ss,  unit: "" },
      { v: hrvNorm, w: 0.25, label: "HRV",    raw: hrv, unit: "" },
      { v: stNorm,  w: 0.20, label: "Стресс", raw: st,  unit: "", invert: true },
      { v: bbNorm,  w: 0.20, label: "BB min", raw: bb,  unit: "" },
    ];
    const valid = weights.filter((m) => m.v != null);
    if (!valid.length) return null;
    const sumW = valid.reduce((a, m) => a + m.w, 0);
    const score = Math.round(valid.reduce((a, m) => a + m.v * m.w, 0) / sumW);
    return { score, parts: weights };
  }

  function scoreLabel(s) {
    if (s == null) return "—";
    if (s >= 80) return "Отличный день";
    if (s >= 65) return "Хороший день";
    if (s >= 50) return "Средний";
    return "День отдыха";
  }

  function statusColor(part) {
    // Класс цвета строки в breakdown — на базе индивидуального metricStatus
    if (part.raw == null || !isFinite(part.raw)) return "";
    const keyMap = {
      "Сон": "sleep_score", "HRV": "hrv_last_night",
      "Стресс": "stress_avg", "BB min": "body_battery_min",
    };
    const st = metricStatus(keyMap[part.label] || "", part.raw);
    if (st === "good") return "score-row-good";
    if (st === "warn") return "score-row-warn";
    if (st === "bad")  return "score-row-bad";
    return "";
  }

  function renderScore(row) {
    const block = computeScore(row);
    const valEl = document.getElementById("score-value");
    const labEl = document.getElementById("score-label");
    const bdEl  = document.getElementById("score-breakdown");
    if (!block) {
      valEl.textContent = "—";
      labEl.textContent = "Нет данных";
      bdEl.innerHTML = "";
      return;
    }
    valEl.textContent = block.score;
    labEl.textContent = scoreLabel(block.score);
    bdEl.innerHTML = block.parts.map((p) => {
      const valStr = (p.raw == null || !isFinite(p.raw)) ? "—" : Math.round(p.raw);
      return `
        <div class="score-row">
          <span class="score-row-label">${p.label}</span>
          <span class="score-row-value ${statusColor(p)}">${valStr}</span>
        </div>`;
    }).join("");
  }

  // ============================================================
  // STREAKS — серии подряд дней «как» по метрике
  // Возвращает список streak'ов которые ≥3 дней (короче не интересно).
  // ============================================================
  function computeStreaks(rows) {
    if (!rows.length) return [];
    const checks = [
      { key: "sleep_hours", label: "сон ≥7 ч",     ok: (v) => v >= 7,    icon: "🟢" },
      { key: "sleep_hours", label: "сон <6 ч",     ok: (v) => v < 6,     icon: "🔴" },
      { key: "hrv_last_night", label: "HRV ≥40", ok: (v) => v >= 40,   icon: "🟢" },
      { key: "hrv_last_night", label: "HRV <30", ok: (v) => v < 30,    icon: "🔴" },
      { key: "stress_avg", label: "стресс ≤40",   ok: (v) => v <= 40,   icon: "🟢" },
      { key: "stress_avg", label: "стресс ≥60",   ok: (v) => v >= 60,   icon: "🔴" },
      { key: "steps", label: "≥8000 шагов",       ok: (v) => v >= 8000, icon: "🟢" },
    ];
    const result = [];
    for (const c of checks) {
      let count = 0;
      for (let i = rows.length - 1; i >= 0; i--) {
        const v = num(rows[i][c.key]);
        if (!isFinite(v)) break;
        if (c.ok(v)) count++; else break;
      }
      if (count >= 3) result.push({ ...c, count });
    }
    // Сортируем: сначала длинные streak'и
    result.sort((a, b) => b.count - a.count);
    return result.slice(0, 4); // максимум 4, чтобы не разрастался блок
  }

  function renderStreaks(rows) {
    const list = document.getElementById("streaks-list");
    if (!list) return;
    const streaks = computeStreaks(rows);
    if (!streaks.length) {
      list.innerHTML = '<li class="streak"><span class="streak-text" style="color:var(--text-muted)">Серий ≥3 дней пока нет — копим</span></li>';
      return;
    }
    list.innerHTML = streaks.map((s) => `
      <li class="streak">
        <span class="streak-icon">${s.icon}</span>
        <span class="streak-text">${escapeHtml(s.label)}</span>
        <span class="streak-count">${s.count} дн.</span>
      </li>`).join("");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  function showBanner(message, kind) {
    const el = document.getElementById("banner");
    el.style.display = "block";
    el.className = "banner " + (kind || "muted");
    el.innerHTML = message;
  }

  function hideBanner() {
    const el = document.getElementById("banner");
    el.style.display = "none";
  }

  function setLastUpdate(label) {
    const t = label || new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("last-update").textContent = t;
  }

  // ============================================================
  // ОСНОВНОЙ ФЛОУ
  // ============================================================
  async function load() {
    renderHeader();
    hideBanner();

    let garminRows = [];
    let eventRows = [];
    let usingMock = CONFIG.FORCE_MOCK;
    let sheetClosed = false;
    let usingCache = false;

    if (!usingMock) {
      try {
        garminRows = await fetchCsv(CONFIG.SHEET_ID, CONFIG.GARMIN_TAB);
        if (!garminRows.length) throw new Error("empty sheet");
      } catch (e) {
        console.warn("Garmin CSV недоступен:", e.message);
        if (e.code === "sheet_private") sheetClosed = true;

        // Fallback: пробуем взять из кэша
        const cached = loadCache();
        if (cached && cached.garminRows && cached.garminRows.length) {
          garminRows = cached.garminRows;
          eventRows = cached.eventRows || [];
          usingCache = true;
        } else {
          usingMock = true;
        }
      }

      if (!usingMock && !usingCache) {
        try {
          eventRows = await fetchCsv(CONFIG.SHEET_ID, CONFIG.EVENTS_TAB);
        } catch (e) {
          console.warn("Events CSV недоступен:", e.message);
          // не критично, пропускаем
        }
      }
    }

    if (usingMock) {
      garminRows = generateMockGarmin();
      eventRows = [];
    }

    // Баннер: разные сценарии
    if (sheetClosed && usingMock) {
      showBanner(
        '<b>Google Sheets закрыт.</b> Чтобы увидеть живые данные:<br>' +
        '<a href="https://docs.google.com/spreadsheets/d/' + CONFIG.SHEET_ID + '/edit" target="_blank" rel="noopener">' +
        'открыть таблицу</a> → <b>Share</b> → выбрать «<b>Anyone with the link: Viewer</b>».',
        "warn"
      );
    } else if (usingCache) {
      const age = cacheAgeText(loadCache()?.ts);
      showBanner(
        `Нет связи с Google Sheets — показаны последние сохранённые данные${age ? ` (${age})` : ""}. ` +
        `Жмякни «Обновить», когда появится сеть.`,
        "info"
      );
    } else if (usingMock && CONFIG.FORCE_MOCK) {
      showBanner("FORCE_MOCK = true — отображаются demo-данные.", "muted");
    } else if (usingMock) {
      showBanner(
        "Не удалось загрузить данные — показан demo-набор. Если Sheets открыт, попробуй обновить.",
        "info"
      );
    }

    // сортируем по дате на всякий случай
    garminRows.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const latest = garminRows[garminRows.length - 1];

    renderToday(latest);
    renderTrends(garminRows);
    renderHeatmap(garminRows);
    renderScore(latest);
    renderStreaks(garminRows);

    // Сохраняем в кэш только реальные данные (не mock!)
    if (!usingMock && !usingCache) {
      saveCache({ garminRows, eventRows });
    }

    if (usingCache) {
      setLastUpdate(`из кэша · ${cacheAgeText(loadCache()?.ts)}`);
    } else {
      setLastUpdate();
    }
  }

  document.getElementById("refresh-btn").addEventListener("click", () => {
    load().catch((e) => {
      console.error(e);
      showBanner("Ошибка загрузки: " + escapeHtml(e.message), "warn");
    });
  });

  load().catch((e) => {
    console.error(e);
    showBanner("Ошибка загрузки: " + escapeHtml(e.message), "warn");
  });

  // ============================================================
  // PULL-TO-REFRESH (iPhone-жест: потянуть страницу вниз сверху)
  // ============================================================
  (function setupPullToRefresh() {
    const ind = document.getElementById("ptr-indicator");
    if (!ind) return;
    const THRESHOLD = 70;     // сколько надо потянуть, чтобы сработало
    const PEEK_AT = 25;       // когда показывать подсказку
    let startY = null;
    let pulling = false;
    let triggered = false;

    document.addEventListener("touchstart", (e) => {
      if (window.scrollY > 0) { startY = null; return; }
      startY = e.touches[0].clientY;
      pulling = false;
      triggered = false;
    }, { passive: true });

    document.addEventListener("touchmove", (e) => {
      if (startY === null) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > PEEK_AT && !triggered) {
        pulling = true;
        if (dy >= THRESHOLD) {
          ind.classList.add("visible");
          ind.textContent = "Отпусти — обновится";
        } else {
          ind.classList.add("visible");
          ind.textContent = "Потяни ещё чуть-чуть…";
        }
      }
    }, { passive: true });

    document.addEventListener("touchend", () => {
      if (startY === null) { return; }
      if (!pulling) { startY = null; return; }
      const wasVisible = ind.classList.contains("visible");
      // Триггерим refresh, если была преодолена черта.
      // Простая эвристика: если индикатор был с текстом «Отпусти».
      if (wasVisible && ind.textContent === "Отпусти — обновится") {
        triggered = true;
        ind.classList.add("spinning");
        ind.textContent = "Обновляю…";
        load().catch((e) => {
          console.error(e);
          showBanner("Ошибка обновления: " + escapeHtml(e.message), "warn");
        }).finally(() => {
          setTimeout(() => {
            ind.classList.remove("visible", "spinning");
            ind.textContent = "Потяни — обновится";
          }, 350);
        });
      } else {
        ind.classList.remove("visible");
      }
      startY = null;
      pulling = false;
    }, { passive: true });
  })();

  // ============================================================
  // SERVICE WORKER (offline-кэш для статики и API)
  // ============================================================
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((e) => {
        console.warn("SW registration failed:", e);
      });
    });
  }
  </script>
</body>
</html>
